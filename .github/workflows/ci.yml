name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Windows runner - wymagany do zbudowania aplikacji WPF (net8.0-windows).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FreeKSeF.sln
        env:
          # Pobranie pakietu KSeF.Client z GitHub Packages MF wymaga autoryzacji.
          # Dodaj sekret repo NUGET_GH_PAT (PAT z read:packages).
          # Uwaga: nazwa sekretu NIE moze zaczynac sie od "GITHUB_" (prefiks zarezerwowany).
          NUGET_GH_USER: ${{ github.actor }}
          NUGET_GH_PAT: ${{ secrets.NUGET_GH_PAT }}

      - name: Build
        run: dotnet build FreeKSeF.sln -c Release --no-restore

      - name: Test
        run: dotnet test FreeKSeF.sln -c Release --no-build --verbosity normal

      - name: Publish (samodzielny .exe Windows)
        run: dotnet publish src/FreeKSeF.App/FreeKSeF.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Upload artefaktu (FreeKSeF.exe)
        uses: actions/upload-artifact@v4
        with:
          name: FreeKSeF-win-x64
          path: publish/FreeKSeF.exe
          if-no-files-found: error
