name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Windows runner - wymagany do zbudowania aplikacji WPF (net8.0-windows).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FreeKSeF.sln
        env:
          # Potrzebne dopiero po podlaczeniu pakietu KSeF.Client (GitHub Packages MF).
          # Dodaj sekret repo GITHUB_PACKAGES_PAT (PAT z read:packages).
          GITHUB_PACKAGES_USER: ${{ github.actor }}
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_PACKAGES_PAT }}

      - name: Build
        run: dotnet build FreeKSeF.sln -c Release --no-restore

      - name: Test
        run: dotnet test FreeKSeF.sln -c Release --no-build --verbosity normal
