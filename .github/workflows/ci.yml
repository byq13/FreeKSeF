name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # Windows runner - wymagany do zbudowania aplikacji WPF (net8.0-windows).
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FreeKSeF.sln
        env:
          # Pobranie pakietu KSeF.Client z GitHub Packages MF wymaga autoryzacji.
          # Dodaj sekret repo NUGET_GH_PAT (PAT z read:packages).
          # Uwaga: nazwa sekretu NIE moze zaczynac sie od "GITHUB_" (prefiks zarezerwowany).
          NUGET_GH_USER: ${{ github.actor }}
          NUGET_GH_PAT: ${{ secrets.NUGET_GH_PAT }}

      - name: Build
        run: dotnet build FreeKSeF.sln -c Release --no-restore

      - name: Test
        run: dotnet test FreeKSeF.sln -c Release --no-build --verbosity normal

      # Wariant "pelny": exe z wbudowanym .NET - dziala od reki na kazdym Windows,
      # ale duzy. Kompresja single-file zmniejsza go mniej wiecej o polowe.
      - name: Publish (pelny - z .NET w srodku)
        run: dotnet publish src/FreeKSeF.App/FreeKSeF.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish-full

      # Wariant "lekki": maly exe, wymaga zainstalowanego .NET Desktop Runtime 10 (x64).
      - name: Publish (lekki - wymaga .NET Desktop Runtime 10)
        run: dotnet publish src/FreeKSeF.App/FreeKSeF.App.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish-light

      - name: Upload artefaktu (pelny)
        uses: actions/upload-artifact@v4
        with:
          name: FreeKSeF-win-x64
          path: publish-full/FreeKSeF.exe
          if-no-files-found: error

      - name: Upload artefaktu (lekki)
        uses: actions/upload-artifact@v4
        with:
          name: FreeKSeF-win-x64-lekki
          path: publish-light/FreeKSeF.exe
          if-no-files-found: error
